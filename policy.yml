# Sample policy configuration for ScanCode action
license:
  allowed:
    - apache-2.0
    - mit
    - bsd-2-clause
    - bsd-3-clause
  prohibited:
    - gpl-3.0
    - agpl-3.0
  minimum_clarity_score: 80

vulnerabilities:
  maximum_severity: medium  
  fail_on_unpatchable: true

dependencies:
  allow_outdated: false
  require_direct_dependencies_only: false